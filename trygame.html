		backImg.onerror = () => {
			console.warn("Nepavyko įkelti background.png");
		};

		function background() {
			ctx.imageSmoothingEnabled = false;

			if (backImg.complete && backImg.naturalWidth > 0) {
				ctx.drawImage(backImg, 0, 0, canvas.width, canvas.height);
			} else {
				ctx.fillStyle = "#222";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
			}
		}

		function saveLocal() {
			localStorage.setItem("playerMoney", playerMoney);
			localStorage.setItem("items", JSON.stringify(items));
			localStorage.setItem("holdingItem", JSON.stringify(holdingItem));
			localStorage.setItem("ifHolding", ifHolding);
			localStorage.setItem("objects", JSON.stringify(objects));
		}

		function loadLocal() {
			playerMoney = parseInt(localStorage.getItem("playerMoney")) || 0;

			try {
				items = JSON.parse(localStorage.getItem("items")) || [];
				holdingItem = JSON.parse(localStorage.getItem("holdingItem")) || {};
				objects = JSON.parse(localStorage.getItem("objects")) || [];
			} catch {
				items = [];
				holdingItem = {};
				objects = [];
			}

			ifHolding = localStorage.getItem("ifHolding") === "true";
		}

		loadLocal();

		setInterval(() => {
			playerMoney += 1;
			saveLocal();
		}, 1000);

		function resize(width, height) {
			canvas.width = width;
			canvas.height = height;
		}

		window.addEventListener("resize", () => {
			resize(window.innerWidth, window.innerHeight);
		});

		resize(window.innerWidth, window.innerHeight);

		function shop() {
			background();

			if (!shopOpened) {
				drawHUD();
				return;
			}

			ctx.fillStyle = "rgba(0,0,0,0.7)";
			ctx.fillRect(50, 50, canvas.width - 100, canvas.height - 100);

			ctx.fillStyle = "white";
			ctx.font = "24px sans-serif";
			ctx.fillText(getText("shop"), 60, 80);

			ctx.font = "18px sans-serif";
			ctx.fillText(getText("money") + playerMoney + "€", 60, 110);
			ctx.fillText(getText("holding") + (ifHolding ? holdingItem.name : "(nieko)"), 60, 130);
			ctx.fillText(getText("etoclose"), 60, 150);
			ctx.fillText(getText("controls"), 60, 170);
			ctx.fillText(getText("selectctrl"), 60, 190);

			shopItems.forEach((item, index) => {
				const y = 220 + index * 20;
				ctx.fillStyle = index === selectedItem ? "yellow" : "white";
				ctx.fillText(`${item.name} - €${item.price}`, 60, y);
			});
		}

		function drawHUD() {
			ctx.fillStyle = "white";
			ctx.font = "18px sans-serif";

			ctx.fillText(getText("money") + playerMoney + "€", 10, 20);
			ctx.fillText(getText("etoshop"), 10, 40);
			ctx.fillText(getText("holding") + (ifHolding ? holdingItem.name : "(nieko)"), 10, 60);
			ctx.fillText(getText("hd"), 10, 80);
			ctx.fillText(getText("inv"), 10, 100);
			ctx.fillText(getText("clear"), 10, 120);
		}

		function drawObjects() {
			objects.forEach(obj => {

				if (!obj.image) return;

				const img = loadImage(obj.image);

				// jeigu paveikslėlis dar loading
				// tiesiog skipina frame
				if (!img.complete || img.naturalWidth <= 0) {
					return;
				}

				ctx.drawImage(
					img,
					obj.x,
					obj.y,
					200,
					200
				);
			});
		}

		function drawPlacementPreview() {
			if (!ifHolding || !holdingItem.image || shopOpened) return;

			const img = loadImage(holdingItem.image);

			ctx.globalAlpha = 0.5;

			if (img.complete && img.naturalWidth > 0) {
				ctx.drawImage(img, mouseX - 100, mouseY - 100, 200, 200);
			} else {
				ctx.fillStyle = "rgba(255,255,255,0.4)";
				ctx.fillRect(mouseX - 100, mouseY - 100, 200, 200);
			}

			ctx.globalAlpha = 1;

			ctx.strokeStyle = "yellow";
			ctx.lineWidth = 2;
			ctx.strokeRect(mouseX - 100, mouseY - 100, 200, 200);
		}

		function holdItem(item) {
			if (ifHolding) return false;

			holdingItem = item;
			ifHolding = true;
			saveLocal();

			return true;
		}

		function dropHolding() {
			if (!ifHolding) return false;

			items.push(holdingItem);
			holdingItem = {};
			ifHolding = false;
			saveLocal();

			return true;
		}

		canvas.addEventListener("mousemove", event => {
			const rect = canvas.getBoundingClientRect();

			mouseX = event.clientX - rect.left;
			mouseY = event.clientY - rect.top;
		});

		canvas.addEventListener("click", () => {
			if (shopOpened) return;
			if (!ifHolding) return;

			objects.push({
				name: holdingItem.name,
				image: holdingItem.image,
				x: mouseX - 100,
				y: mouseY - 100
			});

			holdingItem = {};
			ifHolding = false;

			saveLocal();
		});

		document.addEventListener("keydown", event => {
			if (event.code === "KeyE") {
				shopOpened = !shopOpened;
				return;
			}

			if (event.code === "KeyI") {
				alert(
					"Inventorius:\n" +
					(items.length > 0 ? items.map(it => `- ${it.name}`).join("\n") : "- (tuščia)")
				);
				return;
			}

			if (event.code === "KeyH") {
				if (ifHolding) {
					alert("Jūs jau laikote daiktą. Pirmiausia padėkite jį su D.");
				} else if (items.length > 0) {
					const picked = items[0];
					items.splice(0, 1);
					holdItem(picked);
					alert(`Dabar laikote: ${picked.name}`);
				} else {
					alert("Inventorius tuščias");
				}

				return;
			}

			if (event.code === "KeyD") {
				if (ifHolding) {
					const dropped = holdingItem;
					dropHolding();
					alert(`Padėtas ${dropped.name} į inventorių.`);
				} else {
					alert("Nėra ką padėti");
				}

				return;
			}

			if (event.code == "KeyC") {
				localStorage.clear();
				location.reload();

				return;
			}

			if (!shopOpened) return;

			if (event.code === "ArrowUp") {
				selectedItem = (selectedItem - 1 + shopItems.length) % shopItems.length;
			}

			if (event.code === "ArrowDown") {
				selectedItem = (selectedItem + 1) % shopItems.length;
			}

			if (event.code === "Enter") {
				const item = shopItems[selectedItem];

				if (playerMoney >= item.price) {
					if (ifHolding) {
						alert("Jūs jau laikote daiktą. Pirma padėkite jį.");
						return;
					}

					playerMoney -= item.price;
					holdItem({ ...item });
					alert(`Nupirkta: ${item.name}`);
					saveLocal();
				} else {
					alert("Nepakanka pinigų");
				}
			}
		});

		function gameLoop() {
			background();
			drawObjects();
			drawPlacementPreview();

			if (shopOpened) {
				shop();
			} else {
				drawHUD();
			}

			requestAnimationFrame(gameLoop);
		}

		gameLoop();
	</script>
</canvas>
